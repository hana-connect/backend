spring:
  config:
    import:
      - classpath:security.yml

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3308/hanaconnectdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: hanaconnect

  jpa:
    hibernate:
      ddl-auto: create
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          time_zone: Asia/Seoul
        order_inserts: true
        order_updates: true
        format_sql: true
        use_sql_comments: true

  sql:
    init:
      mode: always

  flyway:
    enabled: false
    baseline-on-migrate: true
