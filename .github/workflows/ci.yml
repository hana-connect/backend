name: Hana Connect CI

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: HanaConnect
          MYSQL_DATABASE: hanaconnectdb
          MYSQL_USER: hanaconnect
          MYSQL_PASSWORD: 12345678
          TZ: Asia/Seoul
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u hanaconnect -p12345678"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -P 3306 -u hanaconnect -p12345678 && exit 0
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Create CI test config files
        run: |
          mkdir -p src/test/resources

          cat > src/test/resources/application.yml <<EOF
          spring:
            config:
              import:
                - classpath:security.yml

            datasource:
              driver-class-name: com.mysql.cj.jdbc.Driver
              url: jdbc:mysql://127.0.0.1:3306/hanaconnectdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
              username: hanaconnect

            jpa:
              hibernate:
                ddl-auto: create
                naming:
                  physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
              show-sql: true
              defer-datasource-initialization: true
              properties:
                hibernate:
                  jdbc:
                    batch_size: 50
                    time_zone: Asia/Seoul
                  order_inserts: true
                  order_updates: true
                  format_sql: true
                  use_sql_comments: true

            sql:
              init:
                mode: always

            flyway:
              enabled: false
              baseline-on-migrate: true
          EOF

          cat > src/test/resources/security.yml <<EOF
          spring:
            datasource:
              password: 12345678

          app:
            crypto:
              key: 1234567890123456

          jwt:
            secret: ${{ secrets.JWT_SECRET_KEY }}
            access-token-expiration-ms: 3600000
            refresh-token-expiration-ms: 1209600000

          quiz-ai:
            api-key: dummy-key
            model: gpt-4.1-mini
            base-url: https://api.openai.com/v1

          asset-ai:
            api-key: test-api-key
            model: gpt-4.1-mini
            base-url: https://api.openai.com/v1
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon --stacktrace
