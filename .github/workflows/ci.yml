name: Hana Connect CI

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: HanaConnect
          MYSQL_DATABASE: hanaconnectdb
          MYSQL_USER: hanaconnect
          MYSQL_PASSWORD: 12345678
          TZ: Asia/Seoul
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u hanaconnect -p12345678"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Wait for MySQL to be ready
        run: |
          until docker exec $(docker ps -q --filter ancestor=mysql:8.0) mysqladmin ping -h 127.0.0.1 -u hanaconnect -p12345678 --silent; do
            echo "MySQL 서버가 아직 안 켜졌어요... 2초 대기 중"
            sleep 2
          done

      - name: Create CI config files
        run: |
          mkdir -p src/main/resources

          cat > src/main/resources/application.yml <<EOF
          spring:
            application:
              name: hanaconnect
              password: 12345678

            config:
              import: classpath:security.yml

            datasource:
              driver-class-name: com.mysql.cj.jdbc.Driver
              url: jdbc:mysql://127.0.0.1:3306/hanaconnectdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
              username: hanaconnect

            jpa:
              hibernate:
                ddl-auto: create-drop
                naming:
                  physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
              show-sql: true
              defer-datasource-initialization: true
              properties:
                hibernate:
                  jdbc:
                    batch_size: 50
                    time_zone: Asia/Seoul
                  order_inserts: true
                  order_updates: true
                  format_sql: true
                  use_sql_comments: true

            sql:
              init:
                mode: never

            flyway:
              enabled: false
              baseline-on-migrate: true

            web:
              resources:
                add-mappings: false

            servlet:
              multipart:
                location: src/main/resources/static/tmp
                max-request-size: 10MB
                max-file-size: 2MB

            messages:
              basename: messages/message

          upload:
            path: src/main/resources/static/upload
            secure: src/main/upload/secure

          management:
            server:
              port: 9001
            endpoints:
              web:
                exposure:
                  include: health,beans,env,metrics
            endpoint:
              metrics:
                access: read_only
              shutdown:
                access: unrestricted
              health:
                show-details: always

          springdoc:
            swagger-ui:
              enabled: true
              path: /swagger.html
            api-docs:
              enabled: true
              path: /hanaconnect/api-docs

          quiz-ai:
            api-key: dummy-key
            model: gpt-4.1-mini
            base-url: https://api.openai.com/v1

          asset-ai:
            api-key: test-api-key
            model: gpt-4.1-mini
            base-url: https://api.openai.com/v1  
          EOF

          cat > src/main/resources/security.yml <<EOF
          spring:
            datasource:
              password: 12345678

          app:
            crypto:
              key: 1234567890123456

          jwt:
            secret: ${{ secrets.JWT_SECRET_KEY }}
            access-token-expiration-ms: 3600000
            refresh-token-expiration-ms: 1209600000
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon --stacktrace
