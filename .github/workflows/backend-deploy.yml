name: Backend Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export JAVA_HOME=/usr/lib/jvm/java-21-amazon-corretto.x86_64
            export PATH=$JAVA_HOME/bin:$PATH

            mkdir -p ~/.gradle
            cat > ~/.gradle/gradle.properties <<EOF
            org.gradle.java.installations.paths=/usr/lib/jvm/java-21-amazon-corretto.x86_64
            org.gradle.java.installations.auto-detect=true
            EOF

            cd /home/ec2-user/workspace/backend

            rm -f src/main/resources/application-prod.yml

            git fetch origin
            git checkout main
            git pull origin main

            mkdir -p src/main/resources

            cat > src/main/resources/security.yml <<'EOF'
            ${{ secrets.SECURITY_YML }}
            EOF

            cat > src/main/resources/db.properties <<'EOF'
            ${{ secrets.DB_PROPERTIES }}
            EOF

            chmod +x gradlew
            ./gradlew clean build -x test

            APP_PID=$(pgrep -f 'hanaconnect-0.0.1-SNAPSHOT.jar' || true)
            if [ -n "$APP_PID" ]; then
              kill -15 "$APP_PID" || true
              sleep 5
            fi

            setsid nohup java -jar build/libs/hanaconnect-0.0.1-SNAPSHOT.jar --spring.profiles.active=prod > app.log 2>&1 < /dev/null &
            sleep 15
            grep -q "Started HanaconnectApplication" app.log
