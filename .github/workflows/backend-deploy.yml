name: Backend Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export JAVA_HOME=/usr/lib/jvm/java-21-amazon-corretto.x86_64
            export PATH=$JAVA_HOME/bin:$PATH

            mkdir -p ~/.gradle
            cat > ~/.gradle/gradle.properties <<EOF
            org.gradle.java.installations.paths=/usr/lib/jvm/java-21-amazon-corretto.x86_64
            org.gradle.java.installations.auto-detect=true
            EOF

            cd /home/ec2-user/workspace/backend

            git fetch origin
            git checkout main
            git reset --hard origin/main

            mkdir -p src/main/resources

            cat > src/main/resources/security.yml <<'EOF'
            ${{ secrets.SECURITY_YML }}
            EOF

            cat > src/main/resources/db.properties <<'EOF'
            ${{ secrets.DB_PROPERTIES }}
            EOF

            chmod +x gradlew
            ./gradlew clean build -x test

            # 기존 앱 종료
            if [ -f app.pid ]; then
              OLD_PID=$(cat app.pid)
              if ps -p "$OLD_PID" > /dev/null 2>&1; then
                kill -15 "$OLD_PID" || true
                sleep 5
              fi
              rm -f app.pid
            fi

            sudo fuser -k 8080/tcp || true
            sleep 3

            nohup bash -c "java -jar build/libs/hanaconnect-0.0.1-SNAPSHOT.jar --spring.profiles.active=prod" > app.log 2>&1 < /dev/null &
            echo $! > app.pid

            for i in {1..12}; do
              if grep -q "Started HanaconnectApplication" app.log; then
                tail -n 30 app.log
                exit 0
              fi
              sleep 5
            done

            tail -n 100 app.log
            exit 1
