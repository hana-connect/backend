name: Backend Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export JAVA_HOME=/usr/lib/jvm/java-21-amazon-corretto.x86_64
            export PATH=$JAVA_HOME/bin:$PATH

            mkdir -p ~/.gradle
            cat > ~/.gradle/gradle.properties <<EOF
            org.gradle.java.installations.paths=/usr/lib/jvm/java-21-amazon-corretto.x86_64
            org.gradle.java.installations.auto-detect=true
            EOF

            cd /home/ec2-user/workspace/backend

            rm -f src/main/resources/application-prod.yml

            git fetch origin
            git checkout main
            git pull origin main

            mkdir -p src/main/resources

            cat > src/main/resources/security.yml <<'EOF'
            ${{ secrets.SECURITY_YML }}
            EOF

            cat > src/main/resources/db.properties <<'EOF'
            ${{ secrets.DB_PROPERTIES }}
            EOF

            chmod +x gradlew
            ./gradlew clean build -x test

            # ── 기존 프로세스 종료 ────────────────────────────
            if [ -f app.pid ]; then
              OLD_PID=$(cat app.pid)
              if kill -0 "$OLD_PID" 2>/dev/null; then
                echo "기존 프로세스(PID: $OLD_PID) 종료 중..."
                kill -15 "$OLD_PID" || true

                # SIGTERM 후 최대 10초 대기, 안 죽으면 SIGKILL
                for i in {1..10}; do
                  if ! kill -0 "$OLD_PID" 2>/dev/null; then
                    echo "프로세스 정상 종료됨"
                    break
                  fi
                  sleep 1
                done

                # 아직 살아있으면 강제 종료
                if kill -0 "$OLD_PID" 2>/dev/null; then
                  echo "강제 종료(SIGKILL) 적용..."
                  kill -9 "$OLD_PID" || true
                fi
              fi
              rm -f app.pid
            fi

            # app.pid 와 무관하게 8080 포트 점유 프로세스 정리 (안전망)
            LEFTOVER=$(lsof -ti :8080) || true
            if [ -n "$LEFTOVER" ]; then
              echo "8080 포트 점유 프로세스($LEFTOVER) 강제 종료..."
              kill -9 $LEFTOVER || true
            fi

            # 포트가 완전히 해제될 때까지 대기 (최대 15초)
            for i in {1..15}; do
              if ! lsof -i :8080 > /dev/null 2>&1; then
                echo "8080 포트 해제 확인"
                break
              fi
              echo "포트 해제 대기 중... ($i/15)"
              sleep 1
            done

            # ── 새 앱 실행 ──────────────────────────────────────
            nohup bash -c "java -jar build/libs/hanaconnect-0.0.1-SNAPSHOT.jar --spring.profiles.active=prod" > app.log 2>&1 < /dev/null &
            echo $! > app.pid
            echo "새 프로세스 시작 (PID: $(cat app.pid))"

            # ── 기동 확인 (최대 60초) ───────────────────────────
            for i in {1..12}; do
              if grep -q "Started HanaconnectApplication" app.log; then
                echo "배포 성공"
                tail -n 30 app.log
                exit 0
              fi

              # 실패 로그가 찍히면 즉시 종료
              if grep -q "APPLICATION FAILED TO START" app.log; then
                echo "애플리케이션 기동 실패"
                tail -n 100 app.log
                exit 1
              fi

              echo "기동 대기 중... ($i/12)"
              sleep 5
            done

            echo "기동 타임아웃"
            tail -n 100 app.log
            exit 1
