name: Hana Connect CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: HanaConnect
          MYSQL_DATABASE: hanaconnectdb
          MYSQL_USER: hanaconnect
          MYSQL_PASSWORD: 12345678
          TZ: Asia/Seoul
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u hanaconnect -p12345678"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create CI config files
        run: |
          mkdir -p src/main/resources

          cat > src/main/resources/db.properties <<EOF
          spring.datasource.url=jdbc:mysql://127.0.0.1:3306/hanaconnectdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
          spring.datasource.username=hanaconnect
          spring.datasource.password=12345678
          EOF

          cat > src/main/resources/security.yml <<EOF
          app:
            crypto:
              key: 1234567890123456

          jwt:
            secret: ${{ secrets.JWT_SECRET_KEY }}
            access-token-expiration-ms: 3600000
            refresh-token-expiration-ms: 1209600000

          quiz-ai:
            api-key: dummy-key
            model: gpt-4.1-mini
            base-url: https://api.openai.com/v1

          asset-ai:
            api-key: dummy-key
            model: gpt-4.1-mini
            base-url: https://api.openai.com/v1
          EOF

      - name: Verify config files
        run: |
          ls -al src/main/resources
          test -f src/main/resources/db.properties
          test -f src/main/resources/security.yml

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon --stacktrace
