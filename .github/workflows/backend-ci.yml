name: Hana Connect CI

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: hanaconnectdb
      DB_USER: hanaconnect
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      APP_CRYPTO_KEY: ${{ secrets.APP_CRYPTO_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: hanaconnectdb
          MYSQL_USER: hanaconnect
          MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
          TZ: Asia/Seoul
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h "$DB_HOST" -P "$DB_PORT" -u"$DB_USER" -p"$DB_PASSWORD" && exit 0
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Create CI test config files
        run: |
          mkdir -p src/test/resources

          cat > src/test/resources/application.yml <<EOF
          spring:
            config:
              import:
                - classpath:security.yml

            datasource:
              driver-class-name: com.mysql.cj.jdbc.Driver
              url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
              username: ${DB_USER}

            jpa:
              hibernate:
                ddl-auto: create
                naming:
                  physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
              show-sql: true
              defer-datasource-initialization: true
              properties:
                hibernate:
                  jdbc:
                    batch_size: 50
                    time_zone: Asia/Seoul
                  order_inserts: true
                  order_updates: true
                  format_sql: true
                  use_sql_comments: true

            sql:
              init:
                mode: always

            flyway:
              enabled: false
              baseline-on-migrate: true
          EOF

          cat > src/test/resources/security.yml <<EOF
          spring:
            datasource:
              password: ${DB_PASSWORD}

          app:
            crypto:
              key: ${APP_CRYPTO_KEY}

          jwt:
            secret: ${JWT_SECRET_KEY}
            access-token-expiration-ms: 3600000
            refresh-token-expiration-ms: 1209600000

          quiz-ai:
            api-key: dummy-key
            model: gpt-4.1-mini
            base-url: https://api.openai.com/v1

          asset-ai:
            api-key: test-api-key
            model: gpt-4.1-mini
            base-url: https://api.openai.com/v1
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon --stacktrace
